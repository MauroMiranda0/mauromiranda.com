    <!-- Configuración Tailwind optimizada -->

        tailwind.config = {
            darkMode: "class",
            theme: {

    <!-- Estilos críticos inline para evitar FOUC -->
    <style>
        /* Efectos visuales optimizados */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(13, 166, 242, 0.05) 0%, rgba(13, 166, 242, 0) 100%);
            pointer-events: none;
        }

        .grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(13, 166, 242, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Optimización de altura mínima */
        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Optimización de imágenes */
        img {
            height: auto;
            max-width: 100%;
        }

        /* Transiciones suaves optimizadas */
        .transition-optimized {
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }

        /* Terminal cursor blink */
        .terminal-cursor::after {
            content: '▏';
            margin-left: 2px;
            animation: cursorBlink 1s step-end infinite;
            color: #0da6f2;
            font-weight: 300;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Signal strength bars */
        .signal-bar {
            display: inline-flex;
            align-items: end;
            gap: 2px;
            height: 12px;
        }

        .signal-bar__bar {
            width: 3px;
            background: #0da6f2;
            border-radius: 1px;
            animation: signalPulse 1.5s ease-in-out infinite;
        }

        .signal-bar__bar:nth-child(1) { height: 4px; animation-delay: 0s; }
        .signal-bar__bar:nth-child(2) { height: 7px; animation-delay: 0.2s; }
        .signal-bar__bar:nth-child(3) { height: 10px; animation-delay: 0.4s; }
        .signal-bar__bar:nth-child(4) { height: 12px; animation-delay: 0.6s; }

        @keyframes signalPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Data scan bar */
        .data-scan {
            position: relative;
            overflow: hidden;
        }

        .data-scan::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(13, 166, 242, 0.15) 50%,
                transparent 100%);
            animation: dataScan 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes dataScan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Version flicker */
        .version-flicker {
            animation: versionFlicker 4s ease-in-out infinite;
        }

        @keyframes versionFlicker {
            0%, 90%, 92%, 100% { opacity: 1; }
            91% { opacity: 0.3; }
            93% { opacity: 0.8; }
        }

        /* Glitch text */
        .glitch-text {
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip: rect(0, 0, 0, 0);
        }

        .glitch-text:hover::before {
            left: -1px;
            color: rgba(13, 166, 242, 0.6);
            animation: glitchBefore 0.3s ease-in-out infinite alternate;
        }

        .glitch-text:hover::after {
            left: 1px;
            color: rgba(13, 166, 242, 0.3);
            animation: glitchAfter 0.4s ease-in-out infinite alternate;
        }

        @keyframes glitchBefore {
            0% { clip: rect(0, 9999px, 10px, 0); }
            100% { clip: rect(15px, 9999px, 30px, 0); }
        }

        @keyframes glitchAfter {
            0% { clip: rect(20px, 9999px, 40px, 0); }
            100% { clip: rect(5px, 9999px, 20px, 0); }
        }

        /* Processing spinner */
        .processing-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(13, 166, 242, 0.2);
            border-top-color: #0da6f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
        }

        .modal-overlay--active {
            opacity: 1;
            visibility: visible;
        }

        .modal-overlay__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal {
            position: relative;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            background: #f5f7f8;
            border: 1px solid rgba(13, 166, 242, 0.2);
            border-radius: 0.75rem;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark .modal {
            background: #0f172a;
        }

        .modal-overlay--active .modal {
            transform: scale(1) translateY(0);
        }

        .modal__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(13, 166, 242, 0.1);
        }

        .modal__close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(13, 166, 242, 0.2);
            border-radius: 0.25rem;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s ease-out, border-color 0.2s ease-out;
        }

        .modal__close:hover {
            color: #0da6f2;
            border-color: #0da6f2;
        }

        .modal__body {
            padding: 2rem 1.5rem;
        }

        /* Scrollbar modal */
        .modal::-webkit-scrollbar {
            width: 4px;
        }

        .modal::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal::-webkit-scrollbar-thumb {
            background: rgba(13, 166, 242, 0.3);
            border-radius: 9999px;
        }

        @media (min-width: 768px) {
            .modal__body {
                padding: 2.5rem;
            }
            .modal__header {
                padding: 1.25rem 2.5rem;
            }
        }
    </style>
